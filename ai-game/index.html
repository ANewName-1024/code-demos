<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星际传奇 | Text Adventure</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* Typing cursor animation */
    .cursor {
      display: inline-block;
      width: 10px;
      height: 18px;
      background: var(--primary);
      animation: blink 1s infinite;
      margin-left: 2px;
      vertical-align: middle;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Matrix Rain Canvas -->
  <canvas id="matrixCanvas"></canvas>

  <!-- Game Container -->
  <div class="game-container">
    <!-- Header -->
    <header class="game-header">
      <div class="header-left">
        <span class="system-status">
          <span class="status-dot"></span>
          SYSTEM ONLINE
        </span>
      </div>
      <div class="header-center">
        <h1 class="game-title">星际传奇</h1>
        <span class="game-subtitle">NEURAL TEXT ADVENTURE</span>
      </div>
      <div class="header-right">
        <span class="time-display" id="gameTime">00:00:00</span>
      </div>
    </header>

    <!-- Main Game Area -->
    <main class="game-main">
      <!-- Character Stats -->
      <aside class="stats-panel">
        <h3>▸ 角色属性</h3>
        <div class="stat-item">
          <span class="stat-label">生命值</span>
          <div class="stat-bar">
            <div class="stat-fill" id="hpBar" style="width: 100%"></div>
          </div>
          <span class="stat-value" id="hpValue">100/100</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">能量值</span>
          <div class="stat-bar energy">
            <div class="stat-fill" id="energyBar" style="width: 100%"></div>
          </div>
          <span class="stat-value" id="energyValue">100/100</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">经验值</span>
          <div class="stat-bar exp">
            <div class="stat-fill" id="expBar" style="width: 0%"></div>
          </div>
          <span class="stat-value" id="expValue">0</span>
        </div>
        
        <div class="inventory-section">
          <h4>▸ 背包物品</h4>
          <ul class="inventory-list" id="inventoryList">
            <li class="empty">背包为空</li>
          </ul>
        </div>
        
        <div class="achievements-section">
          <h4>▸ 成就</h4>
          <ul class="achievements-list" id="achievementsList">
            <li class="locked">???</li>
          </ul>
        </div>
      </aside>

      <!-- Story Display -->
      <section class="story-panel">
        <div class="terminal-window">
          <div class="terminal-header">
            <span class="terminal-title">◉ NEURAL_LINK v2.7</span>
          </div>
          <div class="terminal-body" id="storyDisplay">
            <!-- Story content will be inserted here -->
          </div>
        </div>
      </section>

      <!-- Side Panel -->
      <aside class="side-panel">
        <div class="log-section">
          <h3>▸ 操作日志</h3>
          <div class="action-log" id="actionLog">
            <p class="log-entry system">> 系统初始化完成...</p>
          </div>
        </div>
        
        <div class="mini-map">
          <h3>▸ 星图</h3>
          <div class="map-display" id="miniMap">
            <div class="map-player">◆</div>
          </div>
          <p class="location-name" id="locationName">地球·北京</p>
        </div>
      </aside>
    </main>

    <!-- Command Input -->
    <footer class="command-panel">
      <div class="command-input-wrapper">
        <span class="command-prompt">➜</span>
        <input type="text" id="commandInput" placeholder="输入指令... (输入 '帮助' 查看指令)" autocomplete="off" autofocus>
        <button class="command-submit" id="submitBtn">▸</button>
      </div>
      <div class="command-hints">
        <span class="hint">帮助</span>
        <span class="hint">状态</span>
        <span class="hint">物品</span>
        <span class="hint">探索</span>
        <span class="hint">使用</span>
      </div>
    </footer>
  </div>

  <!-- Choice Modal -->
  <div class="choice-modal" id="choiceModal">
    <div class="modal-content">
      <h3 class="modal-title">▸ 请选择</h3>
      <div class="choices" id="choiceButtons">
        <!-- Choice buttons will be inserted here -->
      </div>
    </div>
  </div>

  <!-- Start Screen -->
  <div class="start-screen" id="startScreen">
    <div class="start-content">
      <div class="title-animation">
        <h1 class="main-title">星际传奇</h1>
        <p class="subtitle">NEURAL TEXT ADVENTURE</p>
      </div>
      <div class="start-instructions">
        <p>欢迎来到星际传奇</p>
        <p>一个关于勇气与智慧的文字冒险游戏</p>
        <div class="key-hints">
          <span>[ Enter ] 开始游戏</span>
          <span>[ ↑↓ ] 选择</span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
